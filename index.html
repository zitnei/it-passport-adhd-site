<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ADHD特化 ITパスポート学習サイト</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-screen">
    <a class="site-link" href="https://www3.jitec.ipa.go.jp/JitesCbt/html/openinfo/questions.html" target="_blank" rel="noopener noreferrer">IPA公式過去問を開く</a>

    <section class="topbar card">
      <div class="brand"><span class="logo">IP</span><span>ADHD特化 ITパスポート学習サイト</span></div>
      <div class="top-stats">
        <span>正答率 <b id="scoreRate">0%</b></span>
        <span>解答 <b id="answeredCount">0</b></span>
        <span>正解 <b id="correctCount">0</b></span>
        <span>苦手 <b id="weakCount">0</b></span>
      </div>
      <button id="resetBtn" class="ghost">リセット</button>
    </section>

    <section class="controls card">
      <label>分野
        <select id="categorySelect">
          <option value="all">全部</option>
          <option value="strategy">ストラテジ</option>
          <option value="management">マネジメント</option>
          <option value="technology">テクノロジ</option>
        </select>
      </label>
      <label>モード
        <select id="modeSelect">
          <option value="normal">通常</option>
          <option value="adhd">集中</option>
        </select>
      </label>
      <button id="startBtn" class="primary">スタート</button>
      <button id="weakBtn" class="secondary">苦手だけ</button>
      <button id="nextBtn" class="secondary">スキップ</button>
    </section>

    <section class="quiz card" id="quizCard">
      <div class="quiz-top">
        <span id="tag" class="tag">分野</span>
        <span id="qNo" class="qno">Q</span>
      </div>
      <h1 id="question">スタートを押してください</h1>
      <div id="choices" class="choices"></div>
      <div id="result" class="result hidden"></div>
      <div id="explain" class="explain hidden"></div>
    </section>
  </main>
  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
